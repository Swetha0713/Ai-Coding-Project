# ============================================================
# AlertCart – Docker Compose
# ============================================================
version: '3.9'

services:

  # ── Node.js Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alertcart_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/alertcart
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */6 * * *}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - alertcart_net
    volumes:
      - app_logs:/app/logs

  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: alertcart_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - alertcart_net

  # ── Mongo Express (DB Admin UI) ──────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: alertcart_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=alertcart123
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - alertcart_net

# ── Networks ──────────────────────────────────────────────
networks:
  alertcart_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  app_logs:
    driver: local
